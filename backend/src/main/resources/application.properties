spring.application.name=green-button

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/greenbutton}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:greenbutton}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:greenbutton}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

livekit.url=${LIVEKIT_URL:ws://localhost:7880}
livekit.api-key=${LIVEKIT_API_KEY:devkey}
livekit.api-secret=${LIVEKIT_API_SECRET:devsecret}

jwt.secret=${JWT_SECRET:change-me-in-production-use-a-long-random-string}
jwt.expiration-ms=86400000
